<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Status</title>
  <style>
    body{font-family:system-ui;margin:16px;max-width:520px}
    .card{border:1px solid #ddd;border-radius:12px;padding:14px}
    a,button{display:block;width:100%;text-align:center;padding:12px;margin-top:12px;
      border:1px solid #000;border-radius:10px;text-decoration:none;font-weight:700}
    .muted{color:#666;word-break:break-all}
  </style>
</head>
<body>
  <h2>{{ title }}</h2>
  <div class="card">
    <div>{{ message }}</div>
    {% if link %}
      <div class="muted" style="margin-top:10px;">{{ link }}</div>
      <a href="{{ link }}">Open</a>
    {% endif %}
  </div>
</body>
</html>
